<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study App</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="app">

    <aside class="sidebar">
        <div class="logo">EduApp</div>
        <nav class="menu">
            <a class="active" href="#">Dashboard</a>
        </nav>
    </aside>

    <main class="main">

        <header class="header">
            <h1>Study Dashboard</h1>
            <p>Manage your learning tasks</p>
        </header>

        <!-- Cards -->
        <section class="cards">
            <div class="card"><h3>Total</h3><p id="total">0</p></div>
            <div class="card"><h3>Done</h3><p id="done">0</p></div>
            <div class="card"><h3>Pending</h3><p id="pending">0</p></div>
            <div class="card"><h3>Progress</h3><p id="progress">0%</p></div>
        </section>

        <!-- Add Task -->
        <section class="add-box">
            <input id="taskInput" type="text" placeholder="Enter task...">
            <button onclick="addTask()">Add</button>
        </section>

        <!-- Table -->
        <section class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Task</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="taskTable"></tbody>
            </table>
        </section>

    </main>

</div>

<script src="js/app.js"></script>
</body>
</html>
