<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Winter Study Planner</title>

    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/modal.css">
</head>

<body>

<div id="app">

    <aside class="sidebar">
        <div class="brand">🎓 Winter Study Planner</div>

        <div class="nav">
            <button class="active">🏠 Dashboard</button>
            <button>📚 Lessons</button>
            <button>📅 Weeks</button>
            <button>📊 Progress</button>
            <button>⚙️ Settings</button>
        </div>
    </aside>

    <main class="main">

        <div class="topbar">
            <h2>Dashboard</h2>

            <input type="text" placeholder="Search lessons..." class="search">

            <button onclick="toggleTheme()">🌙</button>
        </div>

        <section class="grid grid-4" id="stats">
            <div class="card">📚 Weeks: --</div>
            <div class="card">📖 Lessons: --</div>
            <div class="card">🧪 Tests: --</div>
            <div class="card">📊 Progress: --</div>
        </section>

        <section class="card">
            <h3>Overall Progress</h3>
            <div class="progress" style="background: #e2e8f0; border-radius: 10px; overflow: hidden; height: 20px; margin-top: 10px;">
                <div id="progress-bar" style="width: 0%; height: 100%; background: linear-gradient(135deg, #4f46e5, #2563eb); color: white; text-align: center; font-size: 12px; line-height: 20px; transition: width 0.4s ease;">0%</div>
            </div>
        </section>

        <section class="grid grid-3" id="weeks-container">
            </section>

    </main>

</div>

<div id="modal" class="modal hidden" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); overflow: auto;">
    <div class="modal-content" style="background-color: #fefefe; margin: 5% auto; padding: 20px; border: 1px solid #888; width: 85%; max-width: 1000px; border-radius: 12px; direction: rtl; position: relative;">
        <span class="close" onclick="closeModal()" style="color: #aaa; float: left; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
        <div id="modal-body">
            </div>
    </div>
</div>

<script type="module" src="js/core/app.js"></script>

<script>
function toggleTheme() {
    document.body.classList.toggle("light");
}
</script>

</body>
</html>
