<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winter Study Planner</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2 class="logo">Study</h2>

        <nav class="menu">
            <a href="#" class="active">Dashboard</a>
            <a href="#">Tasks</a>
            <a href="#">Schedule</a>
            <a href="#">Notes</a>
            <a href="#">Settings</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main">

        <!-- Top Cards -->
        <section class="cards">
            <div class="card">
                <h3>Tasks</h3>
                <p>12</p>
            </div>

            <div class="card">
                <h3>Completed</h3>
                <p>5</p>
            </div>

            <div class="card">
                <h3>Pending</h3>
                <p>7</p>
            </div>

            <div class="card">
                <h3>Streak</h3>
                <p>3 days</p>
            </div>
        </section>

        <!-- Week Bar -->
        <section class="week-bar">
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
            <div>Sun</div>
        </section>

        <!-- Table -->
        <section class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Task</th>
                        <th>Time</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Math</td>
                        <td>Algebra Revision</td>
                        <td>2h</td>
                        <td>Done</td>
                    </tr>

                    <tr>
                        <td>English</td>
                        <td>Grammar Practice</td>
                        <td>1h</td>
                        <td>Pending</td>
                    </tr>

                    <tr>
                        <td>Science</td>
                        <td>Chapter 3</td>
                        <td>1.5h</td>
                        <td>In Progress</td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>

</div>

</body>
</html>
