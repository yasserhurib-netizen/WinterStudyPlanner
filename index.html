<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">Study</div>

        <nav class="menu">
            <a class="active" href="#">Dashboard</a>
            <a href="#">Planner</a>
            <a href="#">Subjects</a>
            <a href="#">Notes</a>
        </nav>
    </aside>

    <!-- Main -->
    <main class="main">

        <!-- Header -->
        <header class="header">
            <h1>Good evening 👋</h1>
            <p>Your study overview</p>
        </header>

        <!-- Cards -->
        <section class="cards">
            <div class="card">
                <h3>Tasks</h3>
                <p>12</p>
            </div>

            <div class="card">
                <h3>Completed</h3>
                <p>5</p>
            </div>

            <div class="card">
                <h3>Pending</h3>
                <p>7</p>
            </div>
        </section>

        <!-- Simple Week Row -->
        <section class="week">
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
            <div>Sun</div>
        </section>

        <!-- Table -->
        <section class="table">
            <table>
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Task</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Math</td>
                        <td>Algebra practice</td>
                        <td>Done</td>
                    </tr>

                    <tr>
                        <td>English</td>
                        <td>Reading</td>
                        <td>Pending</td>
                    </tr>

                    <tr>
                        <td>Science</td>
                        <td>Chapter 2</td>
                        <td>In progress</td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>

</div>

</body>
</html>
